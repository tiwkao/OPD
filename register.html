<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ลงทะเบียนผู้ประเมิน - OPD Teaching</title>
<script src="https://cdn.tailwindcss.com"></script>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Sarabun', 'Noto Sans Thai', sans-serif; font-size: 16px; }
  .card-shadow { box-shadow: 0 2px 8px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.08); }
</style>
</head>
<body class="bg-slate-50 min-h-screen">

<script>
  const API_URL = 'https://script.google.com/macros/s/XXXXXXXXXXXXXXXXXXXXXX/exec';
  const LIFF_ID = 'YOUR_REGISTER_LIFF_ID'; // แทนที่ด้วย LIFF ID ของหน้านี้ (สร้างแยกจากหน้าประเมิน)
  const EVALUATE_URL = 'https://YOUR_GITHUB_PAGES_URL/evaluate.html'; // แทนที่ด้วย URL หน้าแบบประเมินจริง
  const FALLBACK_IMG = 'data:image/svg+xml;utf8,' + encodeURIComponent(
    '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">' +
    '<rect width="100" height="100" fill="#E2E8F0"/>' +
    '<circle cx="50" cy="38" r="18" fill="#94A3B8"/>' +
    '<path d="M50 62c-20 0-32 12-32 26v12h64V88c0-14-12-26-32-26z" fill="#94A3B8"/>' +
    '</svg>'
  );
</script>

<div class="bg-blue-700 pb-8 pt-6 px-4 rounded-b-3xl shadow-lg">
  <div class="max-w-md mx-auto text-center">
    <h1 class="text-xl font-bold text-white">ลงทะเบียนผู้ประเมิน</h1>
    <p class="text-blue-100 text-sm mt-1">สำหรับอาจารย์ผู้ประเมินนักศึกษาแพทย์ (OPD Teaching)</p>
  </div>
</div>

<div class="max-w-md mx-auto p-4 -mt-4">
  <div id="loadingBox" class="bg-white rounded-xl card-shadow p-6 text-center text-slate-400">
    กำลังโหลดข้อมูล...
  </div>

  <!-- ================= ฟอร์มลงทะเบียนครั้งแรก ================= -->
  <div id="registerBox" class="bg-white rounded-xl card-shadow p-6 hidden">
    <div class="flex flex-col items-center mb-4">
      <img id="previewImage" src="" class="w-24 h-24 rounded-full object-cover border-4 border-blue-100 bg-slate-100 mb-3">
      <p class="text-slate-400 text-xs">รูปโปรไฟล์ดึงจาก LINE อัตโนมัติ</p>
    </div>
    <label class="block text-sm font-medium text-slate-600 mb-1">ชื่อ-นามสกุล (สำหรับแสดงในระบบประเมิน) *</label>
    <input id="nameInput" type="text" class="w-full border border-slate-300 rounded-lg px-3 py-2.5 mb-1" placeholder="เช่น พญ. สมหญิง ใจดี">
    <p class="text-slate-400 text-xs mb-4">แก้ไขให้เป็นชื่อทางการได้ หากชื่อ LINE ไม่เป็นทางการ</p>
    <button onclick="submitRegister()" id="registerBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition">
      ยืนยันการลงทะเบียน
    </button>
    <p id="registerError" class="text-red-600 text-sm mt-2 hidden"></p>
  </div>

  <!-- ================= ลงทะเบียนแล้ว ================= -->
  <div id="doneBox" class="bg-white rounded-xl card-shadow p-6 text-center hidden">
    <img id="doneImage" src="" class="w-24 h-24 rounded-full object-cover border-4 border-green-100 bg-slate-100 mx-auto mb-3">
    <p class="text-green-600 font-semibold text-sm mb-1">ลงทะเบียนเรียบร้อยแล้ว ✅</p>
    <h2 id="doneName" class="font-bold text-lg text-slate-800 mb-4"></h2>
    <button onclick="showEditForm_()" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-medium py-2.5 rounded-lg transition mb-2">
      แก้ไขชื่อ
    </button>
    <a href="#" id="goEvaluateBtn" class="block w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition">
      ไปหน้าแบบประเมิน
    </a>
  </div>
</div>

<script>
let teacherUid = '';
let linePictureUrl = '';

async function init() {
  let profile = null;
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    profile = await liff.getProfile();
    teacherUid = profile.userId;
    linePictureUrl = profile.pictureUrl || '';
  } catch (err) {
    console.error('LIFF init error', err);
    teacherUid = 'TEST_UID_' + Math.floor(Math.random() * 1000);
  }

  const lookup = await apiGet('getUserByUid', { uid: teacherUid });
  document.getElementById('loadingBox').classList.add('hidden');

  if (lookup.success && lookup.user) {
    renderDone_(lookup.user);
  } else {
    renderRegisterForm_(profile);
  }
}

async function apiGet(action, params) {
  params = params || {};
  const qs = new URLSearchParams({ action, ...params }).toString();
  const res = await fetch(API_URL + '?' + qs);
  return res.json();
}
async function apiPost(action, payload) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action, payload })
  });
  return res.json();
}

function renderRegisterForm_(profile) {
  document.getElementById('registerBox').classList.remove('hidden');
  document.getElementById('previewImage').src = linePictureUrl || FALLBACK_IMG;
  document.getElementById('previewImage').onerror = function() { this.onerror = null; this.src = FALLBACK_IMG; };
  document.getElementById('nameInput').value = profile ? (profile.displayName || '') : '';
}

function renderDone_(user) {
  document.getElementById('doneBox').classList.remove('hidden');
  document.getElementById('doneImage').src = user.ProfileImageUrl || FALLBACK_IMG;
  document.getElementById('doneImage').onerror = function() { this.onerror = null; this.src = FALLBACK_IMG; };
  document.getElementById('doneName').textContent = user.Name;
  document.getElementById('goEvaluateBtn').setAttribute('href', EVALUATE_URL);
}

function showEditForm_() {
  document.getElementById('doneBox').classList.add('hidden');
  renderRegisterForm_({ displayName: document.getElementById('doneName').textContent });
}

async function submitRegister() {
  const name = document.getElementById('nameInput').value.trim();
  const errEl = document.getElementById('registerError');
  errEl.classList.add('hidden');
  if (!name) {
    errEl.textContent = 'กรุณากรอกชื่อ-นามสกุล';
    errEl.classList.remove('hidden');
    return;
  }

  const btn = document.getElementById('registerBtn');
  btn.disabled = true;
  btn.textContent = 'กำลังบันทึก...';

  const res = await apiPost('registerUser', {
    uid: teacherUid,
    name: name,
    profileImageUrl: linePictureUrl,
    role: 'teacher'
  });

  btn.disabled = false;
  btn.textContent = 'ยืนยันการลงทะเบียน';

  if (res.success) {
    document.getElementById('registerBox').classList.add('hidden');
    renderDone_({ Name: name, ProfileImageUrl: linePictureUrl });
  } else {
    errEl.textContent = res.message || 'ลงทะเบียนไม่สำเร็จ กรุณาลองใหม่';
    errEl.classList.remove('hidden');
  }
}

init();
</script>
</body>
</html>
